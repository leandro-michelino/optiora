version: '3.8'

services:
  finops-mcp:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./finops_mcp:/app/finops_mcp
    restart: unless-stopped
    environment:
      MCP_LOG_LEVEL: INFO
    networks:
      - finops

  # Optional: Add a simple monitoring/logging service
  # Add Prometheus, ELK stack, or Grafana as needed for production

networks:
  finops:
    driver: bridge
