# Alembic configuration for OptiOra

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names.
file_template = %%(rev)s_%%(slug)s

# Timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to dateutil.tz.gettz()
# leave blank for localtime
# timezone =

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# to be detected as revisions in the versions/ directory.
# sourceless = false

# Version location specification — multiple path version directories are
# supported.
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# The output encoding used when revision files are written from script.mako
# output_encoding = utf-8

# SQLAlchemy database URL — overridden in env.py to use DATABASE_URL env var.
# This fallback is only used when running `alembic` directly without DATABASE_URL set.
# In all deployment scenarios, set DATABASE_URL instead of relying on this line.
sqlalchemy.url = sqlite:///./optiora.db


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using "black" - use the console_scripts runner, against the "black" entrypoint
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
