optiora_app_dir: /opt/optiora
optiora_app_user: optiora
optiora_api_port: 8000
optiora_api_workers: 2
optiora_dashboard_port: 3000
optiora_python_bin: python3.11
optiora_node_major: 20
optiora_region: uk-london-1
optiora_genai_endpoint: "https://inference.generativeai.uk-london-1.oci.oraclecloud.com"
optiora_genai_model: "meta.llama-3.3-70b-instruct"
# OCI credentials for GenAI (overridden at deploy time from OCI env vars)
optiora_tenancy_ocid: ""
optiora_user_ocid: ""
optiora_fingerprint: ""
optiora_compartment_ocid: "ocid1.compartment.oc1..aaaaaaaa3qjzj6affgfpcnioxmbz6vy2ksynl6h55k3zy5jk5qrnizoxbxya"
optiora_genai_compartment_ocid: "ocid1.compartment.oc1..aaaaaaaa3qjzj6affgfpcnioxmbz6vy2ksynl6h55k3zy5jk5qrnizoxbxya"
optiora_frontend_url: "http://{{ ansible_host }}"
optiora_api_url: "http://{{ ansible_host }}"
optiora_install_nginx: true
optiora_enable_auth: false
optiora_public_workspace_name: "OptiOra Public Workspace"
optiora_public_workspace_email: "public@optiora.local"
optiora_oci_config_file: ""
optiora_oci_profile: ""
optiora_retention_enabled: false
optiora_retention_hot_months: 3
optiora_retention_run_interval_hours: 24
optiora_archive_bucket: ""
optiora_archive_namespace: ""
optiora_oci_db_license_model: "BYOL"
optiora_enable_scan_scheduler: true
optiora_scan_scheduler_interval_minutes: 60
optiora_deployment_target: "oci"
optiora_oci_runtime_required: true
optiora_enforce_oci_runtime: true

# --- nginx / TLS settings (only used when optiora_install_nginx: true) ---
# Set optiora_domain to the public FQDN for certbot. Leave blank to serve
# plain HTTP on port 80 (useful for staging with no DNS yet).
optiora_domain: ""
optiora_certbot_email: ""
# When true and optiora_domain is set, install certbot and request a Let's
# Encrypt cert. When false nginx runs plain HTTP only.
optiora_enable_tls: false

optiora_health_retries: 12
optiora_health_delay: 5

# ── VM hardening defaults ──────────────────────────────────────────────────
optiora_vm_hardening: true
optiora_auto_security_updates: true
optiora_configure_firewall: true
optiora_ssh_port: 22
# Keep direct dashboard/API ports reachable by default when nginx is disabled.
optiora_firewall_expose_direct_services: false
optiora_sysctl_vm_swappiness: 10
optiora_limits_nofile_soft: 65535
optiora_limits_nofile_hard: 131072

# ── Extra block volume (optional) ──────────────────────────────────────────
# The single deployment script can create and attach a dedicated OCI block
# volume automatically. When it does, it passes /dev/oracleoci/oraclevdb here
# so the playbook formats it (ext4, idempotent), mounts it, and uses it as the
# backing store for the application directory and database.
# Leave blank to skip all disk-provisioning tasks.
# Examples:
#   OCI block volume:  /dev/oracleoci/oraclevdb
#   Generic Linux:     /dev/sdb
optiora_data_device: ""
optiora_data_fstype: ext4

# ── Swap file ───────────────────────────────────────────────────────────────
# Set to a fallocate-compatible size string to create a swap file.
# Recommended for instances with < 4 GiB RAM (build steps are memory-heavy).
# Set to "" to skip.
optiora_swap_size: "2G"
