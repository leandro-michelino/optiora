- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart optiora api
  ansible.builtin.systemd:
    name: optiora-api.service
    state: restarted

- name: Restart optiora dashboard
  ansible.builtin.systemd:
    name: optiora-dashboard.service
    state: restarted

- name: Restart sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted

- name: Reload nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
