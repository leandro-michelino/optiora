- name: Install system packages
  ansible.builtin.apt:
    name:
      - build-essential
      - curl
      - libffi-dev
      - libssl-dev
      - openssl
      - postgresql-client
      - python3
      - python3-dev
      - python3-pip
      - python3-venv
      - rsync
      - wget
    update_cache: true
    state: present

- name: Install NodeSource repository
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://deb.nodesource.com/setup_{{ optiora_node_major }}.x | bash -
  args:
    executable: /bin/bash
    creates: "/etc/apt/sources.list.d/nodesource.list"

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    update_cache: true
    state: present

- name: Create application user
  ansible.builtin.user:
    name: "{{ optiora_app_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ optiora_app_dir }}"
    create_home: false

- name: Create application directory
  ansible.builtin.file:
    path: "{{ optiora_app_dir }}"
    state: directory
    owner: "{{ optiora_app_user }}"
    group: "{{ optiora_app_user }}"
    mode: "0755"

- name: Unpack uploaded source archive
  ansible.builtin.unarchive:
    src: "{{ optiora_remote_archive }}"
    dest: "{{ optiora_app_dir }}"
    remote_src: true
    owner: "{{ optiora_app_user }}"
    group: "{{ optiora_app_user }}"
  when: optiora_manage_source | bool
  notify:
    - Restart optiora api
    - Restart optiora dashboard

- name: Ensure source ownership
  ansible.builtin.file:
    path: "{{ optiora_app_dir }}"
    state: directory
    owner: "{{ optiora_app_user }}"
    group: "{{ optiora_app_user }}"
    recurse: true

- name: Create Python virtualenv
  ansible.builtin.command:
    cmd: "{{ optiora_python_bin }} -m venv {{ optiora_app_dir }}/venv"
    creates: "{{ optiora_app_dir }}/venv/bin/python"

- name: Upgrade Python packaging tools
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
      - poetry-core
    virtualenv: "{{ optiora_app_dir }}/venv"
    state: latest

- name: Install backend package
  ansible.builtin.pip:
    name: "{{ optiora_app_dir }}"
    virtualenv: "{{ optiora_app_dir }}/venv"
    editable: true
  notify: Restart optiora api

- name: Install dashboard dependencies
  ansible.builtin.command:
    cmd: npm ci
    chdir: "{{ optiora_app_dir }}/dashboard"
  changed_when: true
  notify: Restart optiora dashboard

- name: Build dashboard
  ansible.builtin.command:
    cmd: npm run build
    chdir: "{{ optiora_app_dir }}/dashboard"
  environment:
    NEXT_PUBLIC_API_URL: "{{ optiora_api_url }}"
  changed_when: true
  notify: Restart optiora dashboard

- name: Generate secret key when missing
  ansible.builtin.command:
    cmd: openssl rand -hex 32
  register: optiora_generated_secret
  changed_when: false
  no_log: true

- name: Write runtime environment
  ansible.builtin.template:
    src: optiora.env.j2
    dest: "{{ optiora_app_dir }}/.env"
    owner: root
    group: "{{ optiora_app_user }}"
    mode: "0640"
  notify:
    - Restart optiora api
    - Restart optiora dashboard

- name: Install API systemd unit
  ansible.builtin.template:
    src: optiora-api.service.j2
    dest: /etc/systemd/system/optiora-api.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart optiora api

- name: Install dashboard systemd unit
  ansible.builtin.template:
    src: optiora-dashboard.service.j2
    dest: /etc/systemd/system/optiora-dashboard.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart optiora dashboard

- name: Flush service handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - optiora-api.service
    - optiora-dashboard.service

- name: Wait for API health
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ optiora_api_port }}/health"
    status_code: 200
  register: optiora_api_health
  retries: "{{ optiora_health_retries }}"
  delay: "{{ optiora_health_delay }}"
  until: optiora_api_health.status == 200

- name: Wait for dashboard
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ optiora_dashboard_port }}"
    status_code: 200
  register: optiora_dashboard_health
  retries: "{{ optiora_health_retries }}"
  delay: "{{ optiora_health_delay }}"
  until: optiora_dashboard_health.status == 200
