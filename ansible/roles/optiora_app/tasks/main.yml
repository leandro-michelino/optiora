- name: Require Oracle Linux host
  ansible.builtin.assert:
    that:
      - ansible_facts.distribution == "OracleLinux"
    fail_msg: >-
      OptiOra provisioning supports only Oracle Linux hosts on OCI.
      Detected {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}.

- name: Build operator-facing provisioning plan
  ansible.builtin.set_fact:
    optiora_summary_host: "{{ ansible_host | default(inventory_hostname, true) }}"
    optiora_summary_front_door: >-
      {{ 'nginx reverse proxy on ports 80/443' if (optiora_install_nginx | bool) else 'direct service ports 3000/8000' }}
    optiora_summary_auth: >-
      {{ 'enabled (login/RBAC enforced)' if (optiora_enable_auth | bool) else 'disabled (public dashboard mode)' }}
    optiora_summary_data_policy: >-
      {{ 'live provider data required' if (optiora_require_live_provider_data | bool) else 'CSV/import mode allowed' }}
    optiora_summary_storage: >-
      {{ 'extra block volume mounted at ' ~ optiora_app_dir if (optiora_data_device | length > 0) else 'boot disk only' }}
    optiora_summary_source: >-
      {{ 'uploaded source archive ' ~ optiora_remote_archive if (optiora_manage_source | bool) else 'existing source on host' }}

- name: Show OptiOra provisioning plan
  ansible.builtin.debug:
    msg: |

      ============================================================
      OptiOra Ansible provisioning plan
      ============================================================

      Target
        Host:              {{ optiora_summary_host }}
        OS:                {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}
        Application dir:   {{ optiora_app_dir }}
        Application user:  {{ optiora_app_user }}
        Source:            {{ optiora_summary_source }}

      Runtime
        Python:            {{ optiora_python_bin }}
        Node.js module:    {{ optiora_node_major }}
        API port:          {{ optiora_api_port }}
        Dashboard port:    {{ optiora_dashboard_port }}
        Front door:        {{ optiora_summary_front_door }}
        Auth:              {{ optiora_summary_auth }}
        Data policy:       {{ optiora_summary_data_policy }}
        Scheduler:         {{ 'enabled' if optiora_enable_scan_scheduler | bool else 'disabled' }}
        Retention:         {{ 'enabled' if optiora_retention_enabled | bool else 'disabled' }}
        Storage:           {{ optiora_summary_storage }}

      This playbook will install packages, apply host hardening, deploy the app,
      build the dashboard, run migrations, restart services, and verify health.

- name: Install Oracle Linux system packages
  ansible.builtin.dnf:
    name:
      - curl
      - dnf-automatic
      - firewalld
      - gcc
      - gcc-c++
      - libffi-devel
      - make
      - openssl
      - openssl-devel
      - openssh-server
      - postgresql
      - python3
      - python3-devel
      - python3-pip
      - python3.11
      - python3.11-devel
      - rsync
      - wget
    update_cache: true
    state: present

- name: Enable Node.js {{ optiora_node_major }} module on Oracle Linux
  ansible.builtin.shell: |
    set -euo pipefail
    dnf -y module reset nodejs
    dnf -y module enable nodejs:{{ optiora_node_major }}
  args:
    executable: /bin/bash

- name: Install Node.js on Oracle Linux
  ansible.builtin.dnf:
    name:
      - nodejs
      - npm
    state: present

- name: Configure dnf-automatic updates on Oracle Linux
  ansible.builtin.ini_file:
    path: /etc/dnf/automatic.conf
    section: commands
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    mode: "0644"
  loop:
    - { option: apply_updates, value: "yes" }
    - { option: download_updates, value: "yes" }
    - { option: upgrade_type, value: "security" }
  when:
    - optiora_vm_hardening | bool
    - optiora_auto_security_updates | bool

- name: Enable dnf-automatic timer on Oracle Linux
  ansible.builtin.systemd:
    name: dnf-automatic.timer
    enabled: true
    state: started
  when:
    - optiora_vm_hardening | bool
    - optiora_auto_security_updates | bool

- name: Configure kernel hardening and memory behavior
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop:
    - { name: "net.ipv4.tcp_syncookies", value: "1" }
    - { name: "net.ipv4.conf.all.rp_filter", value: "1" }
    - { name: "net.ipv4.conf.default.rp_filter", value: "1" }
    - { name: "vm.swappiness", value: "{{ optiora_sysctl_vm_swappiness }}" }
  when: optiora_vm_hardening | bool

- name: Set open file limits for host and app user
  ansible.builtin.copy:
    dest: /etc/security/limits.d/90-optiora.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      * soft nofile {{ optiora_limits_nofile_soft }}
      * hard nofile {{ optiora_limits_nofile_hard }}
      {{ optiora_app_user }} soft nofile {{ optiora_limits_nofile_soft }}
      {{ optiora_app_user }} hard nofile {{ optiora_limits_nofile_hard }}
  when: optiora_vm_hardening | bool

- name: Ensure firewalld is enabled on Oracle Linux
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started
  when:
    - optiora_vm_hardening | bool
    - optiora_configure_firewall | bool

- name: Ensure sshd config drop-in directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure sshd loads drop-in configs
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^\s*Include\s+/etc/ssh/sshd_config\.d/\*\.conf\s*$'
    line: "Include /etc/ssh/sshd_config.d/*.conf"
    insertbefore: BOF
    state: present
    backup: true
  notify: Restart sshd

- name: Remove source-restricted SSH directives from primary sshd config
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^\s*(AllowUsers|DenyUsers|AllowGroups|DenyGroups|ListenAddress)\b'
    state: absent
    backup: true
  notify: Restart sshd

- name: Find sshd drop-in configs
  ansible.builtin.find:
    paths: /etc/ssh/sshd_config.d
    patterns: "*.conf"
    file_type: file
  register: optiora_sshd_dropins

- name: Remove source-restricted SSH directives from sshd drop-ins
  ansible.builtin.lineinfile:
    path: "{{ item.path }}"
    regexp: '^\s*(AllowUsers|DenyUsers|AllowGroups|DenyGroups|ListenAddress)\b'
    state: absent
    backup: true
  loop: "{{ optiora_sshd_dropins.files }}"
  notify: Restart sshd

- name: Ensure sshd accepts connections from OCI security-list approved sources
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/90-optiora-oci-boundary.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible. Do not restrict SSH by source IP on the VM.
      # OCI security lists/network security groups are the ingress boundary.
      Port {{ optiora_ssh_port }}
      AddressFamily any
      PubkeyAuthentication yes
      PasswordAuthentication no
      KbdInteractiveAuthentication no
  notify: Restart sshd

- name: Validate sshd configuration
  ansible.builtin.command:
    cmd: sshd -t
  changed_when: false

- name: Ensure sshd is enabled and running
  ansible.builtin.systemd:
    name: sshd
    enabled: true
    state: started

- name: Open SSH service in firewalld
  ansible.posix.firewalld:
    service: ssh
    permanent: true
    immediate: true
    state: enabled
  when:
    - optiora_vm_hardening | bool
    - optiora_configure_firewall | bool

- name: Open HTTP/HTTPS in firewalld when nginx is enabled
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop:
    - http
    - https
  when:
    - optiora_vm_hardening | bool
    - optiora_configure_firewall | bool
    - optiora_install_nginx | bool

- name: Open direct API/dashboard ports in firewalld when nginx is disabled
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    permanent: true
    immediate: true
    state: enabled
  loop:
    - "{{ optiora_api_port }}"
    - "{{ optiora_dashboard_port }}"
  when:
    - optiora_vm_hardening | bool
    - optiora_configure_firewall | bool
    - not (optiora_install_nginx | bool)
    - optiora_firewall_expose_direct_services | bool

# ── Swap file \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
- name: Create swap file
  ansible.builtin.command:
    cmd: fallocate -l {{ optiora_swap_size }} /swapfile
    creates: /swapfile
  when: optiora_swap_size | length > 0

- name: Set swap file permissions
  ansible.builtin.file:
    path: /swapfile
    owner: root
    group: root
    mode: "0600"
  when: optiora_swap_size | length > 0

- name: Check existing swapfile signature
  ansible.builtin.command:
    cmd: blkid -o value -s TYPE /swapfile
  register: optiora_swapfile_type
  changed_when: false
  failed_when: false
  when: optiora_swap_size | length > 0

- name: Format swap file
  ansible.builtin.command:
    cmd: mkswap /swapfile
  when:
    - optiora_swap_size | length > 0
    - optiora_swapfile_type.stdout != "swap"

- name: Enable swap file
  ansible.builtin.command:
    cmd: swapon /swapfile
  register: swapon_result
  failed_when: swapon_result.rc != 0 and 'already' not in (swapon_result.stderr | lower) and 'busy' not in (swapon_result.stderr | lower)
  changed_when: swapon_result.rc == 0
  when: optiora_swap_size | length > 0

- name: Persist swap in /etc/fstab
  ansible.builtin.mount:
    path: none
    src: /swapfile
    fstype: swap
    opts: sw
    state: present
  when: optiora_swap_size | length > 0

# ── Extra block volume (attach, format, mount) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
- name: Wait for data block device to be present
  ansible.builtin.wait_for:
    path: "{{ optiora_data_device }}"
    timeout: 60
    msg: "Block device {{ optiora_data_device }} did not appear within 60 s. Ensure the volume is attached in OCI/cloud console first."
  when: optiora_data_device | length > 0

- name: Create ext4 filesystem on data device (idempotent)
  community.general.filesystem:
    fstype: "{{ optiora_data_fstype }}"
    dev: "{{ optiora_data_device }}"
    opts: "-L optiora-data -m 1"
  when: optiora_data_device | length > 0

- name: Create application mount point
  ansible.builtin.file:
    path: "{{ optiora_app_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: optiora_data_device | length > 0

- name: Mount data volume at application directory
  ansible.posix.mount:
    path: "{{ optiora_app_dir }}"
    src: "LABEL=optiora-data"
    fstype: "{{ optiora_data_fstype }}"
    opts: "defaults,noatime,nofail"
    state: mounted
  when: optiora_data_device | length > 0

- name: Verify mounted data volume has adequate space (>= 20 GiB)
  ansible.builtin.shell: |
    set -euo pipefail
    avail=$(df -BG --output=avail "{{ optiora_app_dir }}" | tail -1 | tr -d 'G ')
    if [ "$avail" -lt 20 ]; then
      echo "WARNING: only ${avail} GiB available on {{ optiora_app_dir }}; at least 20 GiB recommended"
    fi
  args:
    executable: /bin/bash
  register: disk_space_check
  changed_when: false
  when: optiora_data_device | length > 0

- name: Show disk space check result
  ansible.builtin.debug:
    msg: "{{ disk_space_check.stdout }}"
  when:
    - optiora_data_device | length > 0
    - disk_space_check.stdout | length > 0

- name: Create application user
  ansible.builtin.user:
    name: "{{ optiora_app_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ optiora_app_dir }}"
    create_home: false

- name: Create application directory
  ansible.builtin.file:
    path: "{{ optiora_app_dir }}"
    state: directory
    owner: "{{ optiora_app_user }}"
    group: "{{ optiora_app_user }}"
    mode: "0755"

- name: Remove local-only artifacts from previous deployments
  ansible.builtin.shell: |
    set -euo pipefail
    removed=0
    remove_path() {
      local path="$1"
      if [ -e "$path" ]; then
        rm -rf "$path"
        removed=1
      fi
    }

    remove_path "{{ optiora_app_dir }}/dashboard/node_modules"
    remove_path "{{ optiora_app_dir }}/dashboard/.next"
    remove_path "{{ optiora_app_dir }}/dashboard/out"
    remove_path "{{ optiora_app_dir }}/dashboard/build"
    remove_path "{{ optiora_app_dir }}/dashboard/dist"
    remove_path "{{ optiora_app_dir }}/dashboard/test-results"
    remove_path "{{ optiora_app_dir }}/dashboard/playwright-report"
    remove_path "{{ optiora_app_dir }}/dashboard/tsconfig.tsbuildinfo"
    remove_path "{{ optiora_app_dir }}/.pytest_cache"
    remove_path "{{ optiora_app_dir }}/.mypy_cache"
    remove_path "{{ optiora_app_dir }}/.ruff_cache"
    remove_path "{{ optiora_app_dir }}/.coverage"
    remove_path "{{ optiora_app_dir }}/htmlcov"
    remove_path "{{ optiora_app_dir }}/.tox"
    remove_path "{{ optiora_app_dir }}/tmp"
    remove_path "{{ optiora_app_dir }}/.tmp"
    remove_path "{{ optiora_app_dir }}/artifacts"
    remove_path "{{ optiora_app_dir }}/terraform/.terraform"
    remove_path "{{ optiora_app_dir }}/terraform/terraform.tfvars"
    remove_path "{{ optiora_app_dir }}/terraform/tfplan"

    find "{{ optiora_app_dir }}" \
      \( -path "{{ optiora_app_dir }}/.git" -o -path "{{ optiora_app_dir }}/.oci" -o -path "{{ optiora_app_dir }}/venv" \) -prune \
      -o -type d \( -name "__pycache__" -o -name ".pytest_cache" -o -name ".mypy_cache" -o -name ".ruff_cache" \) \
      -print -exec rm -rf {} + | grep -q . && removed=1 || true

    find "{{ optiora_app_dir }}/terraform" -maxdepth 1 -type f \
      \( -name "*.tfstate" -o -name "*.tfstate.*" \) \
      -print -delete 2>/dev/null | grep -q . && removed=1 || true

    if [ "$removed" -eq 1 ]; then
      echo "removed"
    else
      echo "clean"
    fi
  args:
    executable: /bin/bash
  register: optiora_local_artifact_cleanup
  changed_when: optiora_local_artifact_cleanup.stdout == "removed"
  when: optiora_manage_source | bool

- name: Unpack uploaded source archive
  ansible.builtin.unarchive:
    src: "{{ optiora_remote_archive }}"
    dest: "{{ optiora_app_dir }}"
    remote_src: true
    owner: "{{ optiora_app_user }}"
    group: "{{ optiora_app_user }}"
  when: optiora_manage_source | bool
  notify:
    - Restart optiora api
    - Restart optiora dashboard

- name: Remove stale files from earlier source layouts
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ optiora_app_dir }}/alembic/versions/0013_imported_cost_tags_json.py"
    - "{{ optiora_app_dir }}/{{ 'finops_' ~ 'm' ~ 'cp' }}"
  when: optiora_manage_source | bool

- name: Ensure source ownership
  ansible.builtin.file:
    path: "{{ optiora_app_dir }}"
    state: directory
    owner: "{{ optiora_app_user }}"
    group: "{{ optiora_app_user }}"
    recurse: true

- name: Create OCI credential directory
  ansible.builtin.file:
    path: "{{ optiora_app_dir }}/.oci"
    state: directory
    owner: "{{ optiora_app_user }}"
    group: "{{ optiora_app_user }}"
    mode: "0700"
  when: optiora_oci_config_file | length > 0 or optiora_private_key_path | length > 0

- name: Install OCI config file for runtime credential import
  ansible.builtin.copy:
    src: /tmp/optiora-oci-config
    dest: "{{ optiora_oci_config_file }}"
    owner: "{{ optiora_app_user }}"
    group: "{{ optiora_app_user }}"
    mode: "0600"
    remote_src: true
  when: optiora_oci_config_file | length > 0

- name: Install OCI API key for runtime credential import and GenAI
  ansible.builtin.copy:
    src: /tmp/optiora-oci-api-key.pem
    dest: "{{ optiora_private_key_path }}"
    owner: "{{ optiora_app_user }}"
    group: "{{ optiora_app_user }}"
    mode: "0600"
    remote_src: true
  when: optiora_private_key_path | length > 0

- name: Remove staged OCI credential files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/optiora-oci-config
    - /tmp/optiora-oci-api-key.pem
  when: optiora_oci_config_file | length > 0 or optiora_private_key_path | length > 0

- name: Rewrite OCI config key_file to deployed key path
  ansible.builtin.lineinfile:
    path: "{{ optiora_oci_config_file }}"
    regexp: '^key_file\s*='
    line: "key_file={{ optiora_private_key_path }}"
    owner: "{{ optiora_app_user }}"
    group: "{{ optiora_app_user }}"
    mode: "0600"
  when:
    - optiora_oci_config_file | length > 0
    - optiora_private_key_path | length > 0

- name: Remove old venv if built with wrong Python version
  ansible.builtin.shell: |
    if [ -d "{{ optiora_app_dir }}/venv" ]; then
      py_ver=$("{{ optiora_app_dir }}/venv/bin/python" --version 2>&1 | awk '{print $2}')
      required_minor=$(echo "{{ optiora_python_bin }}" | grep -oP '\d+\.\d+$' || echo "")
      if [ -n "$required_minor" ] && [[ "$py_ver" != "${required_minor}."* ]]; then
        rm -rf "{{ optiora_app_dir }}/venv"
        echo "removed"
      else
        echo "ok"
      fi
    else
      echo "absent"
    fi
  register: venv_cleanup
  changed_when: venv_cleanup.stdout == "removed"
  args:
    executable: /bin/bash

- name: Create Python virtualenv
  ansible.builtin.command:
    cmd: "{{ optiora_python_bin }} -m venv {{ optiora_app_dir }}/venv"
    creates: "{{ optiora_app_dir }}/venv/bin/python"

- name: Upgrade Python packaging tools
  ansible.builtin.command:
    cmd: "{{ optiora_app_dir }}/venv/bin/python -m pip install --upgrade pip setuptools wheel poetry-core"
  changed_when: true

- name: Install backend package
  ansible.builtin.command:
    cmd: "{{ optiora_app_dir }}/venv/bin/python -m pip install -e {{ optiora_app_dir }}"
  changed_when: true
  notify: Restart optiora api

- name: Install dashboard dependencies
  ansible.builtin.command:
    cmd: npm ci --legacy-peer-deps
    chdir: "{{ optiora_app_dir }}/dashboard"
  become_user: "{{ optiora_app_user }}"
  environment:
    HOME: "{{ optiora_app_dir }}"
    NPM_CONFIG_CACHE: "{{ optiora_app_dir }}/.npm-cache"
  changed_when: true
  notify: Restart optiora dashboard

- name: Build dashboard
  ansible.builtin.command:
    cmd: npm run build
    chdir: "{{ optiora_app_dir }}/dashboard"
  become_user: "{{ optiora_app_user }}"
  environment:
    HOME: "{{ optiora_app_dir }}"
    NPM_CONFIG_CACHE: "{{ optiora_app_dir }}/.npm-cache"
    NEXT_TELEMETRY_DISABLED: "1"
    NEXT_PUBLIC_API_URL: "{{ optiora_api_url }}"
  changed_when: true
  notify: Restart optiora dashboard

- name: Generate secret key when missing
  ansible.builtin.command:
    cmd: openssl rand -hex 32
  register: optiora_generated_secret
  changed_when: false
  no_log: true

- name: Write runtime environment
  ansible.builtin.template:
    src: optiora.env.j2
    dest: "{{ optiora_app_dir }}/.env"
    owner: root
    group: "{{ optiora_app_user }}"
    mode: "0640"
  notify:
    - Restart optiora api
    - Restart optiora dashboard

- name: Create log files for services
  ansible.builtin.file:
    path: "{{ item }}"
    state: touch
    owner: "{{ optiora_app_user }}"
    group: "{{ optiora_app_user }}"
    mode: "0640"
    modification_time: preserve
    access_time: preserve
  loop:
    - /var/log/optiora-api.log
    - /var/log/optiora-dashboard.log

- name: Install API systemd unit
  ansible.builtin.template:
    src: optiora-api.service.j2
    dest: /etc/systemd/system/optiora-api.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart optiora api

- name: Install dashboard systemd unit
  ansible.builtin.template:
    src: optiora-dashboard.service.j2
    dest: /etc/systemd/system/optiora-dashboard.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart optiora dashboard

- name: Run database migrations
  ansible.builtin.command:
    cmd: "{{ optiora_app_dir }}/venv/bin/alembic -c {{ optiora_app_dir }}/alembic.ini upgrade head"
    chdir: "{{ optiora_app_dir }}"
  changed_when: true

- name: Fix database file ownership
  ansible.builtin.file:
    path: "{{ optiora_app_dir }}/optiora.db"
    owner: "{{ optiora_app_user }}"
    group: "{{ optiora_app_user }}"
    mode: '0640'
  failed_when: false

- name: Restore SELinux context on application files
  ansible.builtin.command:
    cmd: "restorecon -RF {{ optiora_app_dir }}"
  changed_when: false
  when: ansible_facts.selinux.status == "enabled"

- name: Flush service handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - optiora-api.service
    - optiora-dashboard.service

- name: Wait for API health
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ optiora_api_port }}/health"
    status_code: 200
    return_content: true
  register: optiora_api_health
  retries: "{{ optiora_health_retries }}"
  delay: "{{ optiora_health_delay }}"
  until: optiora_api_health.status == 200

- name: Wait for dashboard
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ optiora_dashboard_port }}"
    status_code: 200
    return_content: false
  register: optiora_dashboard_health
  retries: "{{ optiora_health_retries }}"
  delay: "{{ optiora_health_delay }}"
  until: optiora_dashboard_health.status == 200

# ── nginx reverse-proxy + optional TLS ──────────────────────────────────────
- name: Install nginx on Oracle Linux
  ansible.builtin.dnf:
    name: nginx
    state: present
  when:
    - optiora_install_nginx | bool

- name: Install certbot packages when TLS is enabled
  ansible.builtin.dnf:
    name:
      - certbot
      - python3-certbot-nginx
    state: present
  when:
    - optiora_install_nginx | bool
    - optiora_enable_tls | bool
    - optiora_domain | length > 0
    - optiora_certbot_email | length > 0

- name: Create webroot for ACME challenges
  ansible.builtin.file:
    path: /var/www/certbot
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: optiora_install_nginx | bool

- name: Write nginx site config
  ansible.builtin.template:
    src: nginx-optiora.conf.j2
    dest: /etc/nginx/conf.d/optiora.conf
    mode: "0644"
  when: optiora_install_nginx | bool
  notify: Reload nginx

- name: Allow nginx to proxy upstream services (SELinux)
  ansible.posix.seboolean:
    name: httpd_can_network_connect
    state: true
    persistent: true
  when:
    - optiora_install_nginx | bool
    - ansible_facts.selinux.status == "enabled"

- name: Start and enable nginx
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true
  when: optiora_install_nginx | bool

- name: Flush nginx handlers
  ansible.builtin.meta: flush_handlers
  when: optiora_install_nginx | bool

- name: Obtain Let's Encrypt certificate
  ansible.builtin.command:
    cmd: >
      certbot certonly --webroot
      -w /var/www/certbot
      -d {{ optiora_domain }}
      --email {{ optiora_certbot_email }}
      --agree-tos
      --non-interactive
      --keep-until-expiring
    creates: "/etc/letsencrypt/live/{{ optiora_domain }}/fullchain.pem"
  when:
    - optiora_install_nginx | bool
    - optiora_enable_tls | bool
    - optiora_domain | length > 0
    - optiora_certbot_email | length > 0
  notify: Reload nginx

- name: Re-render nginx config after certificate is available
  ansible.builtin.template:
    src: nginx-optiora.conf.j2
    dest: /etc/nginx/conf.d/optiora.conf
    mode: "0644"
  when:
    - optiora_install_nginx | bool
    - optiora_enable_tls | bool
    - optiora_domain | length > 0
  notify: Reload nginx

- name: Install certbot renewal cron
  ansible.builtin.cron:
    name: certbot-renew
    minute: "0"
    hour: "3"
    weekday: "1"
    job: "certbot renew --quiet --deploy-hook 'systemctl reload nginx'"
    user: root
  when:
    - optiora_install_nginx | bool
    - optiora_enable_tls | bool

- name: Check API service state for summary
  ansible.builtin.command:
    cmd: systemctl is-active optiora-api.service
  register: optiora_api_service_active
  changed_when: false
  failed_when: false

- name: Check dashboard service state for summary
  ansible.builtin.command:
    cmd: systemctl is-active optiora-dashboard.service
  register: optiora_dashboard_service_active
  changed_when: false
  failed_when: false

- name: Check API service enablement for summary
  ansible.builtin.command:
    cmd: systemctl is-enabled optiora-api.service
  register: optiora_api_service_enabled
  changed_when: false
  failed_when: false

- name: Check dashboard service enablement for summary
  ansible.builtin.command:
    cmd: systemctl is-enabled optiora-dashboard.service
  register: optiora_dashboard_service_enabled
  changed_when: false
  failed_when: false

- name: Check nginx service state for summary
  ansible.builtin.command:
    cmd: systemctl is-active nginx
  register: optiora_nginx_service_active
  changed_when: false
  failed_when: false
  when: optiora_install_nginx | bool

- name: Check nginx enablement for summary
  ansible.builtin.command:
    cmd: systemctl is-enabled nginx
  register: optiora_nginx_service_enabled
  changed_when: false
  failed_when: false
  when: optiora_install_nginx | bool

- name: Read runtime versions for summary
  ansible.builtin.shell: |
    set -euo pipefail
    echo "backend=$({{ optiora_app_dir }}/venv/bin/optiora --version 2>/dev/null || echo unavailable)"
    echo "python=$({{ optiora_app_dir }}/venv/bin/python --version 2>&1 || echo unavailable)"
    echo "node=$(node --version 2>/dev/null || echo unavailable)"
    echo "npm=$(npm --version 2>/dev/null || echo unavailable)"
  args:
    executable: /bin/bash
  register: optiora_runtime_versions
  changed_when: false
  failed_when: false

- name: Read application storage usage for summary
  ansible.builtin.command:
    cmd: "df -hP {{ optiora_app_dir }}"
  register: optiora_app_storage
  changed_when: false
  failed_when: false

- name: Check rendered environment file presence for summary
  ansible.builtin.stat:
    path: "{{ optiora_app_dir }}/.env"
  register: optiora_env_file_stat

- name: Build deployment access summary
  ansible.builtin.set_fact:
    optiora_access_scheme: "{{ 'https' if (optiora_install_nginx | bool and optiora_enable_tls | bool and optiora_domain | length > 0) else 'http' }}"
    optiora_access_host: "{{ optiora_domain if (optiora_install_nginx | bool and optiora_domain | length > 0) else optiora_summary_host }}"
    optiora_public_base_url: "{{ ('https' if (optiora_install_nginx | bool and optiora_enable_tls | bool and optiora_domain | length > 0) else 'http') ~ '://' ~ (optiora_domain if (optiora_install_nginx | bool and optiora_domain | length > 0) else optiora_summary_host) }}"
    optiora_dashboard_access_url: "{{ ((('https' if (optiora_enable_tls | bool and optiora_domain | length > 0) else 'http') ~ '://' ~ (optiora_domain if (optiora_domain | length > 0) else optiora_summary_host)) ~ '/dashboard') if (optiora_install_nginx | bool) else (optiora_frontend_url ~ '/dashboard') }}"
    optiora_api_health_access_url: "{{ ((('https' if (optiora_enable_tls | bool and optiora_domain | length > 0) else 'http') ~ '://' ~ (optiora_domain if (optiora_domain | length > 0) else optiora_summary_host)) ~ '/health') if (optiora_install_nginx | bool) else (optiora_api_url ~ '/health') }}"
    optiora_api_info_access_url: "{{ ((('https' if (optiora_enable_tls | bool and optiora_domain | length > 0) else 'http') ~ '://' ~ (optiora_domain if (optiora_domain | length > 0) else optiora_summary_host)) ~ '/api/v1/info') if (optiora_install_nginx | bool) else (optiora_api_url ~ '/api/v1/info') }}"
    optiora_openapi_access_url: "{{ ((('https' if (optiora_enable_tls | bool and optiora_domain | length > 0) else 'http') ~ '://' ~ (optiora_domain if (optiora_domain | length > 0) else optiora_summary_host)) ~ '/openapi.json') if (optiora_install_nginx | bool) else (optiora_api_url ~ '/openapi.json') }}"
    optiora_docs_access_url: "{{ ((('https' if (optiora_enable_tls | bool and optiora_domain | length > 0) else 'http') ~ '://' ~ (optiora_domain if (optiora_domain | length > 0) else optiora_summary_host)) ~ '/docs') if (optiora_install_nginx | bool) else (optiora_api_url ~ '/docs') }}"
    optiora_health_version: "{{ optiora_api_health.json.version | default('unknown') if optiora_api_health.json is defined else 'unknown' }}"
    optiora_storage_summary: "{{ (optiora_app_storage.stdout_lines | default([]))[-1] | default('storage check unavailable') }}"
    optiora_env_file_mode: "{{ optiora_env_file_stat.stat.mode | default('missing') }}"

- name: Show OptiOra access summary
  ansible.builtin.debug:
    msg: |

      ============================================================
      OptiOra deployment complete
      ============================================================

      Access URLs
        Dashboard:              {{ optiora_dashboard_access_url }}
        AI insights:            {{ optiora_dashboard_access_url | regex_replace('/dashboard$', '/dashboard/ai-insights') }}
        Cost advisor:           {{ optiora_dashboard_access_url | regex_replace('/dashboard$', '/dashboard/cost-advisor') }}
        Settings:               {{ optiora_dashboard_access_url | regex_replace('/dashboard$', '/dashboard/settings') }}
        API health:             {{ optiora_api_health_access_url }}
        API info:               {{ optiora_api_info_access_url }}
        API docs:               {{ optiora_docs_access_url }}
        OpenAPI JSON:           {{ optiora_openapi_access_url }}

      Local health checks on the VM
        API health status:      HTTP {{ optiora_api_health.status | default('unknown') }} (version {{ optiora_health_version }})
        Dashboard status:       HTTP {{ optiora_dashboard_health.status | default('unknown') }}

      Services
        optiora-api:            {{ optiora_api_service_active.stdout | default('unknown') }} / {{ optiora_api_service_enabled.stdout | default('unknown') }}
        optiora-dashboard:      {{ optiora_dashboard_service_active.stdout | default('unknown') }} / {{ optiora_dashboard_service_enabled.stdout | default('unknown') }}
        nginx:                  {{ (optiora_nginx_service_active.stdout | default('not installed')) if (optiora_install_nginx | bool) else 'disabled by configuration' }} / {{ (optiora_nginx_service_enabled.stdout | default('not installed')) if (optiora_install_nginx | bool) else 'disabled by configuration' }}

      Runtime configuration
        Release/API version:    {{ optiora_health_version }}
        Application directory:  {{ optiora_app_dir }}
        Runtime user:           {{ optiora_app_user }}
        Environment file:       {{ optiora_app_dir }}/.env (mode {{ optiora_env_file_mode }})
        Database URL source:    {{ 'custom optiora_database_url' if (optiora_database_url is defined and optiora_database_url | length > 0) else 'default SQLite file or OCI DB env fallback' }}
        Storage:                {{ optiora_storage_summary }}
        Front door:             {{ optiora_summary_front_door }}
        TLS:                    {{ 'enabled for ' ~ optiora_domain if (optiora_install_nginx | bool and optiora_enable_tls | bool and optiora_domain | length > 0) else 'not enabled' }}
        Auth:                   {{ optiora_summary_auth }}
        Data policy:            {{ optiora_summary_data_policy }}
        Scheduler:              {{ 'enabled, interval ' ~ optiora_scan_scheduler_interval_minutes ~ ' minutes' if optiora_enable_scan_scheduler | bool else 'disabled' }}
        Retention:              {{ 'enabled, hot months ' ~ optiora_retention_hot_months if optiora_retention_enabled | bool else 'disabled' }}

      OCI GenAI
        Region:                 {{ optiora_region | default('uk-london-1', true) }}
        Endpoint:               {{ optiora_genai_endpoint | default('https://inference.generativeai.uk-london-1.oci.oraclecloud.com', true) }}
        Model:                  {{ optiora_genai_model | default('meta.llama-3.3-70b-instruct', true) }}
        Runtime OCI config:     {{ optiora_oci_config_file | default('not installed', true) }}
        Runtime OCI profile:    {{ optiora_oci_profile | default('DEFAULT', true) }}

      Runtime versions
      {{ optiora_runtime_versions.stdout | default('version check unavailable') | indent(8, true) }}

      Operator commands
        SSH:                    ssh {{ ansible_user | default('opc') }}@{{ optiora_summary_host }}
        Verify from laptop:     ./deploy/deploy-oci.sh verify
        Service status:         sudo systemctl status optiora-api optiora-dashboard nginx --no-pager
        Follow API logs:        sudo journalctl -u optiora-api -f
        Follow dashboard logs:  sudo journalctl -u optiora-dashboard -f
        Last API logs:          sudo journalctl -u optiora-api -n 100 --no-pager
        Last dashboard logs:    sudo journalctl -u optiora-dashboard -n 100 --no-pager
        Restart services:       sudo systemctl restart optiora-api optiora-dashboard
        Re-run migrations:      cd {{ optiora_app_dir }} && sudo -u {{ optiora_app_user }} ./venv/bin/alembic -c alembic.ini upgrade head
        Check local API:        curl -fsS http://127.0.0.1:{{ optiora_api_port }}/health
        Check local dashboard:  curl -fsS http://127.0.0.1:{{ optiora_dashboard_port }}/

      Recommended next steps
        1. Open the dashboard URL above.
        2. Run ./deploy/deploy-oci.sh verify from your laptop.
        3. In Settings, connect real cloud credentials or upload customer billing CSV.
        4. Run a scan, then review Operations, Recommendations, Rightsizing, and AI Insights.
        5. Generate a release evidence pack with scripts/generate_evidence_pack.sh when preparing a handoff.

      If something is not reachable
        - Confirm OCI security list or NSG allows your source IP.
        - Check whether nginx front-door mode is enabled; direct ports 3000/8000 are closed by default.
        - Inspect service logs with the journalctl commands above.
        - Confirm OCI metadata is reachable from the VM when OCI_RUNTIME_REQUIRED=true.
        - Confirm REQUIRE_LIVE_PROVIDER_DATA matches your intended live-provider vs CSV-only mode.
