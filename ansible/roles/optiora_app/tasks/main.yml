- name: Install Debian/Ubuntu system packages
  ansible.builtin.apt:
    name:
      - build-essential
      - curl
      - fail2ban
      - libffi-dev
      - libssl-dev
      - openssl
      - postgresql-client
      - python3
      - python3-dev
      - python3-pip
      - python3-venv
      - rsync
      - ufw
      - unattended-upgrades
      - wget
    update_cache: true
    state: present
  when: ansible_os_family == "Debian"

- name: Install NodeSource repository on Debian/Ubuntu
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://deb.nodesource.com/setup_{{ optiora_node_major }}.x | bash -
  args:
    executable: /bin/bash
    creates: "/etc/apt/sources.list.d/nodesource.list"
  when: ansible_os_family == "Debian"

- name: Install Node.js on Debian/Ubuntu
  ansible.builtin.apt:
    name: nodejs
    update_cache: true
    state: present
  when: ansible_os_family == "Debian"

- name: Install Oracle Linux / RHEL system packages
  ansible.builtin.dnf:
    name:
      - curl
      - dnf-automatic
      - firewalld
      - gcc
      - gcc-c++
      - libffi-devel
      - make
      - openssl
      - openssl-devel
      - postgresql
      - python3
      - python3-devel
      - python3-pip
      - python3.11
      - python3.11-devel
      - rsync
      - wget
    state: present
  when: ansible_os_family == "RedHat"

- name: Enable Node.js {{ optiora_node_major }} module on Oracle Linux / RHEL
  ansible.builtin.shell: |
    set -euo pipefail
    dnf -y module reset nodejs
    dnf -y module enable nodejs:{{ optiora_node_major }}
  args:
    executable: /bin/bash
  when: ansible_os_family == "RedHat"

- name: Install Node.js on Oracle Linux / RHEL
  ansible.builtin.dnf:
    name:
      - nodejs
      - npm
    state: present
  when: ansible_os_family == "RedHat"

- name: Enable unattended security upgrades on Debian/Ubuntu
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
  when:
    - ansible_os_family == "Debian"
    - optiora_vm_hardening | bool
    - optiora_auto_security_updates | bool

- name: Enable unattended-upgrades service on Debian/Ubuntu
  ansible.builtin.systemd:
    name: unattended-upgrades
    enabled: true
    state: started
  when:
    - ansible_os_family == "Debian"
    - optiora_vm_hardening | bool
    - optiora_auto_security_updates | bool

- name: Configure dnf-automatic updates on Oracle Linux / RHEL
  ansible.builtin.ini_file:
    path: /etc/dnf/automatic.conf
    section: commands
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    mode: "0644"
  loop:
    - { option: apply_updates, value: "yes" }
    - { option: download_updates, value: "yes" }
    - { option: upgrade_type, value: "security" }
  when:
    - ansible_os_family == "RedHat"
    - optiora_vm_hardening | bool
    - optiora_auto_security_updates | bool

- name: Enable dnf-automatic timer on Oracle Linux / RHEL
  ansible.builtin.systemd:
    name: dnf-automatic.timer
    enabled: true
    state: started
  when:
    - ansible_os_family == "RedHat"
    - optiora_vm_hardening | bool
    - optiora_auto_security_updates | bool

- name: Enable fail2ban service on Debian/Ubuntu
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
  when:
    - ansible_os_family == "Debian"
    - optiora_vm_hardening | bool
    - optiora_enable_fail2ban | bool

- name: Configure kernel hardening and memory behavior
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop:
    - { name: "net.ipv4.tcp_syncookies", value: "1" }
    - { name: "net.ipv4.conf.all.rp_filter", value: "1" }
    - { name: "net.ipv4.conf.default.rp_filter", value: "1" }
    - { name: "vm.swappiness", value: "{{ optiora_sysctl_vm_swappiness }}" }
  when: optiora_vm_hardening | bool

- name: Set open file limits for host and app user
  ansible.builtin.copy:
    dest: /etc/security/limits.d/90-optiora.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      * soft nofile {{ optiora_limits_nofile_soft }}
      * hard nofile {{ optiora_limits_nofile_hard }}
      {{ optiora_app_user }} soft nofile {{ optiora_limits_nofile_soft }}
      {{ optiora_app_user }} hard nofile {{ optiora_limits_nofile_hard }}
  when: optiora_vm_hardening | bool

- name: Configure UFW baseline policy on Debian/Ubuntu
  ansible.builtin.shell: |
    set -euo pipefail
    ufw --force default deny incoming
    ufw --force default allow outgoing
    ufw --force allow {{ optiora_ssh_port }}/tcp
    if [[ "{{ optiora_install_nginx | bool }}" == "True" ]]; then
      ufw --force allow 80/tcp
      ufw --force allow 443/tcp
    elif [[ "{{ optiora_firewall_expose_direct_services | bool }}" == "True" ]]; then
      ufw --force allow {{ optiora_api_port }}/tcp
      ufw --force allow {{ optiora_dashboard_port }}/tcp
    fi
    ufw --force enable
  args:
    executable: /bin/bash
  changed_when: false
  when:
    - ansible_os_family == "Debian"
    - optiora_vm_hardening | bool
    - optiora_configure_firewall | bool

- name: Ensure firewalld is enabled on Oracle Linux / RHEL
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started
  when:
    - ansible_os_family == "RedHat"
    - optiora_vm_hardening | bool
    - optiora_configure_firewall | bool

- name: Open SSH service in firewalld
  ansible.posix.firewalld:
    service: ssh
    permanent: true
    immediate: true
    state: enabled
  when:
    - ansible_os_family == "RedHat"
    - optiora_vm_hardening | bool
    - optiora_configure_firewall | bool

- name: Open HTTP/HTTPS in firewalld when nginx is enabled
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop:
    - http
    - https
  when:
    - ansible_os_family == "RedHat"
    - optiora_vm_hardening | bool
    - optiora_configure_firewall | bool
    - optiora_install_nginx | bool

- name: Open direct API/dashboard ports in firewalld when nginx is disabled
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    permanent: true
    immediate: true
    state: enabled
  loop:
    - "{{ optiora_api_port }}"
    - "{{ optiora_dashboard_port }}"
  when:
    - ansible_os_family == "RedHat"
    - optiora_vm_hardening | bool
    - optiora_configure_firewall | bool
    - not (optiora_install_nginx | bool)
    - optiora_firewall_expose_direct_services | bool

# ── Swap file \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
- name: Create swap file
  ansible.builtin.command:
    cmd: fallocate -l {{ optiora_swap_size }} /swapfile
    creates: /swapfile
  when: optiora_swap_size | length > 0

- name: Set swap file permissions
  ansible.builtin.file:
    path: /swapfile
    owner: root
    group: root
    mode: "0600"
  when: optiora_swap_size | length > 0

- name: Check existing swapfile signature
  ansible.builtin.command:
    cmd: blkid -o value -s TYPE /swapfile
  register: optiora_swapfile_type
  changed_when: false
  failed_when: false
  when: optiora_swap_size | length > 0

- name: Format swap file
  ansible.builtin.command:
    cmd: mkswap /swapfile
  when:
    - optiora_swap_size | length > 0
    - optiora_swapfile_type.stdout != "swap"

- name: Enable swap file
  ansible.builtin.command:
    cmd: swapon /swapfile
  register: swapon_result
  failed_when: swapon_result.rc != 0 and 'already' not in (swapon_result.stderr | lower) and 'busy' not in (swapon_result.stderr | lower)
  changed_when: swapon_result.rc == 0
  when: optiora_swap_size | length > 0

- name: Persist swap in /etc/fstab
  ansible.builtin.mount:
    path: none
    src: /swapfile
    fstype: swap
    opts: sw
    state: present
  when: optiora_swap_size | length > 0

# ── Extra block volume (attach, format, mount) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
- name: Wait for data block device to be present
  ansible.builtin.wait_for:
    path: "{{ optiora_data_device }}"
    timeout: 60
    msg: "Block device {{ optiora_data_device }} did not appear within 60 s. Ensure the volume is attached in OCI/cloud console first."
  when: optiora_data_device | length > 0

- name: Create ext4 filesystem on data device (idempotent)
  community.general.filesystem:
    fstype: "{{ optiora_data_fstype }}"
    dev: "{{ optiora_data_device }}"
    opts: "-L optiora-data -m 1"
  when: optiora_data_device | length > 0

- name: Create application mount point
  ansible.builtin.file:
    path: "{{ optiora_app_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: optiora_data_device | length > 0

- name: Mount data volume at application directory
  ansible.posix.mount:
    path: "{{ optiora_app_dir }}"
    src: "LABEL=optiora-data"
    fstype: "{{ optiora_data_fstype }}"
    opts: "defaults,noatime,nofail"
    state: mounted
  when: optiora_data_device | length > 0

- name: Verify mounted data volume has adequate space (>= 20 GiB)
  ansible.builtin.shell: |
    set -euo pipefail
    avail=$(df -BG --output=avail "{{ optiora_app_dir }}" | tail -1 | tr -d 'G ')
    if [ "$avail" -lt 20 ]; then
      echo "WARNING: only ${avail} GiB available on {{ optiora_app_dir }}; at least 20 GiB recommended"
    fi
  args:
    executable: /bin/bash
  register: disk_space_check
  changed_when: false
  when: optiora_data_device | length > 0

- name: Show disk space check result
  ansible.builtin.debug:
    msg: "{{ disk_space_check.stdout }}"
  when:
    - optiora_data_device | length > 0
    - disk_space_check.stdout | length > 0

- name: Create application user
  ansible.builtin.user:
    name: "{{ optiora_app_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ optiora_app_dir }}"
    create_home: false

- name: Create application directory
  ansible.builtin.file:
    path: "{{ optiora_app_dir }}"
    state: directory
    owner: "{{ optiora_app_user }}"
    group: "{{ optiora_app_user }}"
    mode: "0755"

- name: Unpack uploaded source archive
  ansible.builtin.unarchive:
    src: "{{ optiora_remote_archive }}"
    dest: "{{ optiora_app_dir }}"
    remote_src: true
    owner: "{{ optiora_app_user }}"
    group: "{{ optiora_app_user }}"
  when: optiora_manage_source | bool
  notify:
    - Restart optiora api
    - Restart optiora dashboard

- name: Ensure source ownership
  ansible.builtin.file:
    path: "{{ optiora_app_dir }}"
    state: directory
    owner: "{{ optiora_app_user }}"
    group: "{{ optiora_app_user }}"
    recurse: true

- name: Install OCI API key for GenAI (from upload)
  ansible.builtin.copy:
    src: /tmp/optiora-oci-api-key.pem
    dest: "{{ optiora_app_dir }}/oci_api_key.pem"
    owner: root
    group: "{{ optiora_app_user }}"
    mode: "0640"
    remote_src: true
  when: optiora_private_key_path | length > 0
  ignore_errors: true

- name: Remove old venv if built with wrong Python version
  ansible.builtin.shell: |
    if [ -d "{{ optiora_app_dir }}/venv" ]; then
      py_ver=$("{{ optiora_app_dir }}/venv/bin/python" --version 2>&1 | awk '{print $2}')
      required_minor=$(echo "{{ optiora_python_bin }}" | grep -oP '\d+\.\d+$' || echo "")
      if [ -n "$required_minor" ] && [[ "$py_ver" != "${required_minor}."* ]]; then
        rm -rf "{{ optiora_app_dir }}/venv"
        echo "removed"
      else
        echo "ok"
      fi
    else
      echo "absent"
    fi
  register: venv_cleanup
  changed_when: venv_cleanup.stdout == "removed"
  args:
    executable: /bin/bash

- name: Create Python virtualenv
  ansible.builtin.command:
    cmd: "{{ optiora_python_bin }} -m venv {{ optiora_app_dir }}/venv"
    creates: "{{ optiora_app_dir }}/venv/bin/python"

- name: Upgrade Python packaging tools
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
      - poetry-core
    virtualenv: "{{ optiora_app_dir }}/venv"
    state: latest

- name: Install backend package
  ansible.builtin.pip:
    name: "{{ optiora_app_dir }}"
    virtualenv: "{{ optiora_app_dir }}/venv"
    editable: true
  notify: Restart optiora api

- name: Install dashboard dependencies
  ansible.builtin.command:
    cmd: npm ci --legacy-peer-deps
    chdir: "{{ optiora_app_dir }}/dashboard"
  changed_when: true
  notify: Restart optiora dashboard

- name: Build dashboard
  ansible.builtin.command:
    cmd: npm run build
    chdir: "{{ optiora_app_dir }}/dashboard"
  environment:
    NEXT_PUBLIC_API_URL: "{{ optiora_api_url }}"
  changed_when: true
  notify: Restart optiora dashboard

- name: Generate secret key when missing
  ansible.builtin.command:
    cmd: openssl rand -hex 32
  register: optiora_generated_secret
  changed_when: false
  no_log: true

- name: Write runtime environment
  ansible.builtin.template:
    src: optiora.env.j2
    dest: "{{ optiora_app_dir }}/.env"
    owner: root
    group: "{{ optiora_app_user }}"
    mode: "0640"
  notify:
    - Restart optiora api
    - Restart optiora dashboard

- name: Create log files for services
  ansible.builtin.file:
    path: "{{ item }}"
    state: touch
    owner: "{{ optiora_app_user }}"
    group: "{{ optiora_app_user }}"
    mode: "0640"
    modification_time: preserve
    access_time: preserve
  loop:
    - /var/log/optiora-api.log
    - /var/log/optiora-dashboard.log

- name: Install API systemd unit
  ansible.builtin.template:
    src: optiora-api.service.j2
    dest: /etc/systemd/system/optiora-api.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart optiora api

- name: Install dashboard systemd unit
  ansible.builtin.template:
    src: optiora-dashboard.service.j2
    dest: /etc/systemd/system/optiora-dashboard.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart optiora dashboard

- name: Run database migrations
  ansible.builtin.command:
    cmd: "{{ optiora_app_dir }}/venv/bin/alembic -c {{ optiora_app_dir }}/alembic.ini upgrade head"
    chdir: "{{ optiora_app_dir }}"
  changed_when: true

- name: Fix database file ownership
  ansible.builtin.file:
    path: "{{ optiora_app_dir }}/optiora.db"
    owner: "{{ optiora_app_user }}"
    group: "{{ optiora_app_user }}"
    mode: '0640'
  failed_when: false

- name: Flush service handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - optiora-api.service
    - optiora-dashboard.service

- name: Wait for API health
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ optiora_api_port }}/health"
    status_code: 200
  register: optiora_api_health
  retries: "{{ optiora_health_retries }}"
  delay: "{{ optiora_health_delay }}"
  until: optiora_api_health.status == 200

- name: Wait for dashboard
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ optiora_dashboard_port }}"
    status_code: 200
  register: optiora_dashboard_health
  retries: "{{ optiora_health_retries }}"
  delay: "{{ optiora_health_delay }}"
  until: optiora_dashboard_health.status == 200

# ── nginx reverse-proxy + optional TLS ──────────────────────────────────────
- name: Install nginx and certbot on Debian/Ubuntu
  ansible.builtin.apt:
    name:
      - nginx
      - certbot
      - python3-certbot-nginx
    state: present
    update_cache: true
  when:
    - optiora_install_nginx | bool
    - ansible_os_family == "Debian"

- name: Install nginx and certbot on Oracle Linux / RHEL
  ansible.builtin.dnf:
    name:
      - nginx
      - certbot
      - python3-certbot-nginx
    state: present
  when:
    - optiora_install_nginx | bool
    - ansible_os_family == "RedHat"

- name: Create webroot for ACME challenges
  ansible.builtin.file:
    path: /var/www/certbot
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: optiora_install_nginx | bool

- name: Write nginx site config
  ansible.builtin.template:
    src: nginx-optiora.conf.j2
    dest: "{{ '/etc/nginx/conf.d/optiora.conf' if ansible_os_family == 'RedHat' else '/etc/nginx/sites-available/optiora.conf' }}"
    mode: "0644"
  when: optiora_install_nginx | bool
  notify: Reload nginx

- name: Enable nginx site on Debian/Ubuntu
  ansible.builtin.file:
    src: /etc/nginx/sites-available/optiora.conf
    dest: /etc/nginx/sites-enabled/optiora.conf
    state: link
  when:
    - optiora_install_nginx | bool
    - ansible_os_family == "Debian"
  notify: Reload nginx

- name: Remove default nginx site on Debian/Ubuntu
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  when:
    - optiora_install_nginx | bool
    - ansible_os_family == "Debian"
  notify: Reload nginx

- name: Start and enable nginx
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true
  when: optiora_install_nginx | bool

- name: Flush nginx handlers
  ansible.builtin.meta: flush_handlers
  when: optiora_install_nginx | bool

- name: Obtain Let's Encrypt certificate
  ansible.builtin.command:
    cmd: >
      certbot certonly --webroot
      -w /var/www/certbot
      -d {{ optiora_domain }}
      --email {{ optiora_certbot_email }}
      --agree-tos
      --non-interactive
      --keep-until-expiring
    creates: "/etc/letsencrypt/live/{{ optiora_domain }}/fullchain.pem"
  when:
    - optiora_install_nginx | bool
    - optiora_enable_tls | bool
    - optiora_domain | length > 0
    - optiora_certbot_email | length > 0
  notify: Reload nginx

- name: Re-render nginx config after certificate is available
  ansible.builtin.template:
    src: nginx-optiora.conf.j2
    dest: "{{ '/etc/nginx/conf.d/optiora.conf' if ansible_os_family == 'RedHat' else '/etc/nginx/sites-available/optiora.conf' }}"
    mode: "0644"
  when:
    - optiora_install_nginx | bool
    - optiora_enable_tls | bool
    - optiora_domain | length > 0
  notify: Reload nginx

- name: Install certbot renewal cron
  ansible.builtin.cron:
    name: certbot-renew
    minute: "0"
    hour: "3"
    weekday: "1"
    job: "certbot renew --quiet --deploy-hook 'systemctl reload nginx'"
    user: root
  when:
    - optiora_install_nginx | bool
    - optiora_enable_tls | bool

- name: Build deployment access summary
  ansible.builtin.set_fact:
    optiora_access_scheme: "{{ 'https' if (optiora_install_nginx | bool and optiora_enable_tls | bool and optiora_domain | length > 0) else 'http' }}"
    optiora_access_host: "{{ optiora_domain if (optiora_install_nginx | bool and optiora_domain | length > 0) else ansible_host }}"
    optiora_dashboard_access_url: "{{ ((('https' if (optiora_enable_tls | bool and optiora_domain | length > 0) else 'http') ~ '://' ~ (optiora_domain if (optiora_domain | length > 0) else ansible_host)) ~ '/dashboard') if (optiora_install_nginx | bool) else (optiora_frontend_url ~ '/dashboard') }}"
    optiora_api_health_access_url: "{{ ((('https' if (optiora_enable_tls | bool and optiora_domain | length > 0) else 'http') ~ '://' ~ (optiora_domain if (optiora_domain | length > 0) else ansible_host)) ~ '/health') if (optiora_install_nginx | bool) else (optiora_api_url ~ '/health') }}"
    optiora_api_info_access_url: "{{ ((('https' if (optiora_enable_tls | bool and optiora_domain | length > 0) else 'http') ~ '://' ~ (optiora_domain if (optiora_domain | length > 0) else ansible_host)) ~ '/api/v1/info') if (optiora_install_nginx | bool) else (optiora_api_url ~ '/api/v1/info') }}"

- name: Show OptiOra access summary
  ansible.builtin.debug:
    msg: |

      ============================================================
      OptiOra deployment is live
      ============================================================

      Access
        Dashboard:  {{ optiora_dashboard_access_url }}
        API health: {{ optiora_api_health_access_url }}
        API info:   {{ optiora_api_info_access_url }}
        AI hub:     {{ optiora_dashboard_access_url | regex_replace('/dashboard$', '/dashboard/ai-insights') }}
        Advisor:    {{ optiora_dashboard_access_url | regex_replace('/dashboard$', '/dashboard/cost-advisor') }}

      Operations
        SSH:        ssh {{ ansible_user | default('opc') }}@{{ ansible_host }}
        API logs:   sudo journalctl -u optiora-api -n 100 --no-pager
        UI logs:    sudo journalctl -u optiora-dashboard -n 100 --no-pager

      OCI GenAI
        Region:     {{ optiora_region | default('uk-london-1', true) }}
        Endpoint:   {{ optiora_genai_endpoint | default('https://inference.generativeai.uk-london-1.oci.oraclecloud.com', true) }}

