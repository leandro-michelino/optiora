all:
  children:
    optiora:
      hosts:
        optiora-prod:
          ansible_host: 203.0.113.10
          ansible_user: opc
          ansible_ssh_private_key_file: ~/.ssh/optiora-deploy
          # --- Optional: block volume for app + DB data ---
          # Attach a block volume in OCI console first, then set this to the
          # device path. The playbook will format (ext4), mount at optiora_app_dir,
          # and persist the entry in /etc/fstab.
          # The single deployment script writes this automatically when the
          # extra OCI block volume is enabled.
          # optiora_data_device: /dev/oracleoci/oraclevdb
          #
          # --- Optional: swap file (recommended for < 4 GiB RAM instances) ---
          # optiora_swap_size: "2G"

          # --- Optional: VM host firewall behavior ---
          # true  = configure Oracle Linux firewalld from Ansible hardening defaults
          # false = do not configure host firewall (rely on OCI security lists only)
          # optiora_configure_firewall: true

          # true  = host firewall opens 3000/8000 when nginx is disabled
          # false = keep only SSH + (optionally) 80/443 depending on nginx settings
          # optiora_firewall_expose_direct_services: true
