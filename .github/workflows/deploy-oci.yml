name: Test & Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies (Poetry)
        run: |
          python -m pip install --upgrade pip poetry
          poetry install

      - name: Run tests
        run: |
          poetry run pytest tests/ -v --tb=short

      - name: Run type checks
        run: |
          poetry run pyright finops_mcp tests || true

      - name: Check code style
        run: |
          poetry run pylint finops_mcp --disable=all --enable=E,F || true

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'dashboard/package-lock.json'

      - name: Install dependencies
        run: |
          cd dashboard
          npm ci

      - name: Run ESLint
        run: |
          cd dashboard
          npm run lint

      - name: Type check
        run: |
          cd dashboard
          npm run type-check

  # NOTE: Manual OCI deployment is handled from user's laptop via deploy/deploy-oci.sh
  # This workflow does NOT auto-deploy to avoid unexpected production changes
  build-status:
    name: Build Status Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check project structure
        run: |
          echo "✓ Checking project files..."
          test -f pyproject.toml || (echo "❌ Missing pyproject.toml" && exit 1)
          test -f dashboard/package.json || (echo "❌ Missing package.json" && exit 1)
          test -f SETUP.md || (echo "❌ Missing SETUP.md" && exit 1)
          test -d finops_mcp || (echo "❌ Missing finops_mcp" && exit 1)
          echo "✓ All required files present"

      - name: Deployment note  
        run: |
          echo "⚠️  DEPLOYMENT NOTE"
          echo "==================="
          echo "This workflow does NOT auto-deploy to OCI."
          echo "Manual deployment must be done from your laptop:"
          echo ""
          echo "  cd /path/to/optiora"
          echo "  ./deploy/deploy-oci.sh"
          echo ""
          echo "See SETUP.md and OCI_DEPLOYMENT.md for details."
