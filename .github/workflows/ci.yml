name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install backend dependencies
        run: poetry install --no-interaction

      - name: Run backend tests
        run: poetry run python -m unittest discover -s tests -v

  frontend:
    name: Dashboard Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check -- --pretty false

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  svg-route-guardrail:
    name: Animated SVG Route Guardrail
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run SVG route check
        run: ./scripts/check-animated-svg-routes.sh
